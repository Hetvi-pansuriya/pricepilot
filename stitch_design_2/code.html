<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sign Up | PricePilot</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom scrollbar for pro-tool feel */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0f1117;
        }
        ::-webkit-scrollbar-thumb {
            background: #2a2f45;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #3f445e;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-container": "#452000",
                        "on-background": "#e4e1ed",
                        "surface": "#13131b",
                        "primary-fixed-dim": "#c0c1ff",
                        "surface-container-high": "#292932",
                        "on-primary-fixed-variant": "#2f2ebe",
                        "on-primary-container": "#0d0096",
                        "on-secondary-fixed": "#0d1c2d",
                        "on-secondary-fixed-variant": "#39485a",
                        "tertiary-fixed": "#ffdcc5",
                        "background": "#13131b",
                        "outline": "#908fa0",
                        "inverse-surface": "#e4e1ed",
                        "on-surface-variant": "#c7c4d7",
                        "secondary-fixed": "#d4e4fa",
                        "inverse-on-surface": "#303038",
                        "primary-fixed": "#e1e0ff",
                        "tertiary-container": "#d97721",
                        "inverse-primary": "#494bd6",
                        "tertiary-fixed-dim": "#ffb783",
                        "error-container": "#93000a",
                        "surface-container-highest": "#34343d",
                        "surface-container-low": "#1b1b23",
                        "secondary": "#b9c8de",
                        "primary-container": "#8083ff",
                        "outline-variant": "#464554",
                        "on-tertiary-fixed": "#301400",
                        "on-secondary-container": "#a7b6cc",
                        "surface-container": "#1f1f27",
                        "on-tertiary": "#4f2500",
                        "on-surface": "#e4e1ed",
                        "on-error": "#690005",
                        "on-primary-fixed": "#07006c",
                        "on-primary": "#1000a9",
                        "surface-container-lowest": "#0d0d15",
                        "error": "#ffb4ab",
                        "surface-variant": "#34343d",
                        "on-secondary": "#233143",
                        "secondary-container": "#39485a",
                        "on-error-container": "#ffdad6",
                        "surface-dim": "#13131b",
                        "primary": "#c0c1ff",
                        "secondary-fixed-dim": "#b9c8de",
                        "surface-tint": "#c0c1ff",
                        "tertiary": "#ffb783",
                        "on-tertiary-fixed-variant": "#703700",
                        "surface-bright": "#393841"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "sidebar_width": "220px",
                        "base": "8px",
                        "xs": "4px",
                        "xl": "32px",
                        "lg": "24px",
                        "md": "16px",
                        "sm": "12px",
                        "max_content_width": "1280px"
                    },
                    "fontFamily": {
                        "headline-md": ["Inter"],
                        "body-sm": ["Inter"],
                        "label-sm": ["Inter"],
                        "label-caps": ["Inter"],
                        "body-base": ["Inter"],
                        "display-lg": ["Inter"],
                        "headline-sm": ["Inter"]
                    },
                    "fontSize": {
                        "headline-md": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
                        "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "body-base": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "display-lg": ["36px", {"lineHeight": "44px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "headline-sm": ["18px", {"lineHeight": "28px", "fontWeight": "600"}]
                    }
                },
            },
        }
    </script>
</head>
<body class="bg-[#0f1117] text-on-background min-h-screen flex flex-col font-body-base">
<!-- Top Navigation Shell (Filtered for Transactional Page) -->
<!-- As per the 'Semantic Shell' Mandate, we suppress the full Nav, but keep the brand anchor -->
<header class="w-full px-lg py-md flex items-center justify-center md:justify-start">
<div class="flex items-center gap-xs">
<div class="w-8 h-8 bg-primary rounded flex items-center justify-center">
<span class="material-symbols-outlined text-on-primary text-[20px]" style="font-variation-settings: 'FILL' 1;">insights</span>
</div>
<span class="font-headline-sm text-headline-sm font-bold text-on-surface">PricePilot</span>
</div>
</header>
<main class="flex-grow flex items-center justify-center px-md pb-xl">
<!-- Main Signup Card Container -->
<div class="w-full max-w-[440px] bg-[#181c27] border border-[#2a2f45] rounded-xl p-lg md:p-xl shadow-2xl">
<!-- Branding/Heading -->
<div class="text-center mb-xl">
<h1 class="font-headline-md text-headline-md text-on-surface mb-xs">Create your account</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant">Analyze, optimize, and pilot your SaaS pricing strategy.</p>
</div>
<!-- Error Banner Area (Initially Hidden/Functional with JS) -->
<div class="hidden mb-lg flex items-start gap-sm bg-error-container/20 border border-error/30 p-md rounded-lg" id="error-banner">
<span class="material-symbols-outlined text-error text-[20px]">error</span>
<div class="flex-grow">
<p class="font-label-sm text-label-sm text-error font-bold">Registration Error</p>
<p class="font-body-sm text-body-sm text-error opacity-90" id="error-message">Please check your details and try again.</p>
</div>
<button class="text-error hover:opacity-70 transition-opacity" onclick="hideError()">
<span class="material-symbols-outlined text-[18px]">close</span>
</button>
</div>
<!-- Signup Form -->
<form class="space-y-lg" id="signup-form" onsubmit="handleSignup(event)">
<!-- Full Name (Optional but good for SaaS UX) -->
<div class="space-y-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider" for="name">Full Name</label>
<input class="w-full bg-[#0d0d15] border border-[#2a2f45] text-on-surface rounded-lg px-md py-sm focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder:text-outline-variant" id="name" placeholder="John Doe" required="" type="text"/>
</div>
<!-- Email Input -->
<div class="space-y-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider" for="email">Email Address</label>
<input class="w-full bg-[#0d0d15] border border-[#2a2f45] text-on-surface rounded-lg px-md py-sm focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder:text-outline-variant" id="email" placeholder="name@company.com" required="" type="email"/>
</div>
<!-- Password Input -->
<div class="space-y-xs">
<div class="flex justify-between items-center">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider" for="password">Password</label>
</div>
<div class="relative">
<input class="w-full bg-[#0d0d15] border border-[#2a2f45] text-on-surface rounded-lg px-md py-sm focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder:text-outline-variant" id="password" minlength="6" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface transition-colors" onclick="togglePasswordVisibility()" type="button">
<span class="material-symbols-outlined text-[20px]" id="visibility-icon">visibility</span>
</button>
</div>
<p class="font-label-sm text-label-sm text-outline flex items-center gap-xs">
<span class="material-symbols-outlined text-[14px]">info</span>
                        Minimum 6 characters
                    </p>
</div>
<!-- Terms/Privacy -->
<div class="flex items-start gap-sm">
<div class="pt-1">
<input class="w-4 h-4 bg-[#0d0d15] border-[#2a2f45] rounded text-primary focus:ring-primary focus:ring-offset-[#181c27]" id="terms" required="" type="checkbox"/>
</div>
<label class="font-body-sm text-body-sm text-on-surface-variant" for="terms">
                        I agree to the <a class="text-primary hover:underline transition-all" href="#">Terms of Service</a> and <a class="text-primary hover:underline transition-all" href="#">Privacy Policy</a>.
                    </label>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary-container text-on-primary-container font-headline-sm text-headline-sm py-sm rounded-lg hover:bg-primary transition-all duration-200 active:scale-[0.98] flex items-center justify-center gap-sm" id="submit-btn" type="submit">
<span>Sign Up</span>
</button>
</form>
<!-- Footer Links -->
<div class="mt-xl pt-lg border-t border-[#2a2f45] text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                    Already have an account? 
                    <a class="text-primary font-bold hover:text-primary-fixed-dim transition-colors ml-xs" href="#">Log in</a>
</p>
</div>
</div>
</main>
<!-- Footer Decoration -->
<footer class="py-lg text-center opacity-40">
<p class="font-label-sm text-label-sm">© 2024 PricePilot Analytics Inc. Built for Scale.</p>
</footer>
<script>
        function togglePasswordVisibility() {
            const input = document.getElementById('password');
            const icon = document.getElementById('visibility-icon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = 'visibility_off';
            } else {
                input.type = 'password';
                icon.textContent = 'visibility';
            }
        }

        function showDemoError(msg) {
            const banner = document.getElementById('error-banner');
            const message = document.getElementById('error-message');
            message.textContent = msg;
            banner.classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function hideError() {
            const banner = document.getElementById('error-banner');
            banner.classList.add('hidden');
        }

        function handleSignup(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const originalContent = btn.innerHTML;
            
            // UI Feedback
            btn.disabled = true;
            btn.innerHTML = `<span class="animate-spin material-symbols-outlined">sync</span> <span>Creating Account...</span>`;
            
            // Simulating a minor validation error for demonstration
            setTimeout(() => {
                const email = document.getElementById('email').value;
                if (email.includes('test')) {
                    showDemoError("This email address is already associated with a trial account. Please log in or use a different email.");
                    btn.disabled = false;
                    btn.innerHTML = originalContent;
                } else {
                    // Success state simulation
                    btn.innerHTML = `<span class="material-symbols-outlined">check_circle</span> <span>Welcome Aboard</span>`;
                    btn.classList.replace('bg-primary-container', 'bg-green-600');
                    setTimeout(() => {
                        alert("Account created successfully! Check your inbox for a verification link.");
                        btn.disabled = false;
                        btn.innerHTML = originalContent;
                        btn.classList.replace('bg-green-600', 'bg-primary-container');
                    }, 1000);
                }
            }, 1500);
        }

        // Atmospheric micro-interaction for the card border
        document.addEventListener('mousemove', (e) => {
            const card = document.querySelector('.max-w-\\[440px\\]');
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            if (x > 0 && x < rect.width && y > 0 && y < rect.height) {
                card.style.borderColor = `rgba(192, 193, 255, ${0.2 + (Math.sin(Date.now() / 1000) * 0.1)})`;
            } else {
                card.style.borderColor = '#2a2f45';
            }
        });
    </script>
</body></html>
